services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-upstat-local-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_PATH: /app/data/data.db
      # Overrides backend/.env: app requires JWT_SECRET length >= 32. Host/project .env can set JWT_SECRET; else safe local default.
      JWT_SECRET: ${JWT_SECRET:-erp-upstat-local-docker-jwt-secret-32chars-min!}
    ports:
      - "${LOCAL_API_PORT:-3001}:3001"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: erp-upstat-local-frontend
    restart: unless-stopped
    ports:
      - "${LOCAL_WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  backend_data:
